# Event Mode triggering
# Uses the same TS004F-style action topic behavior as ERS-10TZBVK-AA when `operation_mode` is set to `event`.

name: Moes ZG-101ZD (TS004F) - Event setting
service: Zigbee2MQTT
event_type: mqtt
mqtt_topic_format: zigbee2mqtt/+/action
info: |
  Use this blueprint when the device is configured with operation_mode = event.
  The knob can switch between event and command mode by pressing it 3 times.
  In this mode the device emits the direct knob events on the Zigbee2MQTT /action topic: single, double, hold, rotate_left and rotate_right.
buttons:
  - actions:
      - title: press
        conditions:
          - key: payload
            value: single
      - title: press 2x
        conditions:
          - key: payload
            value: double
      - title: hold
        conditions:
          - key: payload
            value: hold
      - title: rotate right
        conditions:
          - key: payload
            value: rotate_right
      - title: rotate left
        conditions:
          - key: payload
            value: rotate_left
